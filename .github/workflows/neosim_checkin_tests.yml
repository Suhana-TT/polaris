name: NeoSim Checkin Tests

on:
  workflow_dispatch:
  push:
  pull_request:
  merge_group:

jobs:
  neosim-rtl-tests:
    env:
      GIST_ID: 'c230835a5065366c13d3bbfb79f23bf6'  # Using same Gist as per requirement
      GIST_TOKEN: ${{ secrets.POLARIS_GIST_TOKEN }}
      REPO_NAME: ${{ github.event.repository.name }}
      GITHUB_REF: ${{ github.ref }}
      GITHUB_SHA: ${{ github.sha }}

    runs-on: tt-ubuntu-2204-large-stable
    strategy:
      max-parallel: 5

    defaults:
      run:
        shell: bash -el {0}

    steps:
    - id: checkout
      name: Checkout
      uses: actions/checkout@v4

    - id: extract-tag
      name: Extract baseline tag
      if: '!cancelled()'
      run: |
        BASELINE_FILE="tools/rtl_neosim_correlation/data/baseline.yaml"

        # Check if baseline file exists
        if [[ ! -f "$BASELINE_FILE" ]]; then
          echo "❌ Error: Baseline file not found: $BASELINE_FILE"
          exit 1
        fi

        # Extract the first tag from baseline.yaml
        TAG=$(grep -A 2 "tag:" "$BASELINE_FILE" | grep "^  -" | head -n1 | sed 's/^  - //' | tr -d '[:space:]')

        # Validate that tag was extracted and is not empty
        if [[ -z "$TAG" ]]; then
          echo "❌ Error: Failed to extract tag from baseline.yaml"
          echo "Expected format: batch containing 'tag:' with list items underneath"
          exit 1
        fi

        # Validate tag contains only alphanumeric characters, hyphens, and underscores
        if [[ ! "$TAG" =~ ^[a-zA-Z0-9_-]+$ ]]; then
          echo "❌ Error: Invalid tag format: '$TAG'"
          echo "Tag should contain only alphanumeric characters, hyphens, and underscores"
          exit 1
        fi

        echo "✅ Successfully extracted tag: $TAG"
        echo "tag=$TAG" >> $GITHUB_OUTPUT
      shell: bash

    - id: setup-mamba
      name: Setup mamba - developer
      if: '!cancelled()'
      uses: ./.github/actions/setup_mamba
      with:
        environment-file: envdev.yaml
        environment-name: poldevenv

    - id: run-rtl-tests
      name: Run RTL Tests
      if: ${{ !cancelled() && steps.extract-tag.outcome == 'success' }}
      uses: ./.github/actions/run-rtl-tests
      with:
        batch-file: tools/rtl_neosim_correlation/data/baseline.yaml
        lfc-files: 'ext_rtl_test_data_set_${{ steps.extract-tag.outputs.tag }}.tar.gz'
        results-file: 'rtl_test_results.txt'

    - id: generate-rtl-badges
      name: Generate RTL Badges
      if: ${{ !cancelled() && github.event_name == 'push' && steps.extract-tag.outcome == 'success' && (steps.run-rtl-tests.outcome == 'success' || steps.run-rtl-tests.outcome == 'failure') }}
      uses: ./.github/actions/generate-rtl-badges
      with:
        gist-id: ${{ env.GIST_ID }}
        gist-token: ${{ env.GIST_TOKEN }}
        repo-name: ${{ env.REPO_NAME }}
        is-main-branch: ${{ github.ref == 'refs/heads/main' }}
        rtl-outcome: ${{ steps.run-rtl-tests.outputs.outcome }}
        rtl-exit-code: ${{ steps.run-rtl-tests.outputs.exit-code }}
        results-file: ${{ steps.run-rtl-tests.outputs.results-file }}

    - id: upload-rtl-artifacts
      name: Upload RTL artifacts
      if: ${{ !cancelled() && steps.extract-tag.outcome == 'success' }}
      uses: actions/upload-artifact@v4
      with:
        name: rtl_artifacts
        path: |
           ${{ steps.run-rtl-tests.outputs.results-file }}
           __llk_out/llk/baseline/${{ steps.extract-tag.outputs.tag }}/*.json
           __llk_out/llk/baseline/${{ steps.extract-tag.outputs.tag }}/*.csv
           __llk_out/llk/baseline/${{ steps.extract-tag.outputs.tag }}/*.png

    - id: check-overall-success
      name: Check Overall Success
      if: '!cancelled()'
      run: |
        echo "Checking overall job success status..."
        echo "This step will succeed ONLY if ALL prior steps have succeeded, regardless of continue-on-error settings"
        echo ""

        # Track steps that are not successful
        NON_SUCCESS_STEPS=""

        if [[ "${{ steps.extract-tag.outcome }}" != "success" ]]; then
          echo "❌ Tag extraction: ${{ steps.extract-tag.outcome }}"
          NON_SUCCESS_STEPS="$NON_SUCCESS_STEPS extract-tag(${{ steps.extract-tag.outcome }})"
        else
          echo "✅ Tag extraction: success"
        fi

        if [[ "${{ steps.run-rtl-tests.outputs.outcome }}" != "success" ]]; then
          echo "❌ RTL tests: ${{ steps.run-rtl-tests.outputs.outcome }}"
          NON_SUCCESS_STEPS="$NON_SUCCESS_STEPS run-rtl-tests(${{ steps.run-rtl-tests.outputs.outcome }})"
        else
          echo "✅ RTL tests: success"
        fi

        if [[ "${{ steps.generate-rtl-badges.outcome }}" != "success" && "${{ steps.generate-rtl-badges.outcome }}" != "skipped" ]]; then
          echo "❌ RTL badges generation: ${{ steps.generate-rtl-badges.outcome }}"
          NON_SUCCESS_STEPS="$NON_SUCCESS_STEPS generate-rtl-badges(${{ steps.generate-rtl-badges.outcome }})"
        else
          echo "✅ RTL badges generation: ${{ steps.generate-rtl-badges.outcome }}"
        fi

        if [[ "${{ steps.upload-rtl-artifacts.outcome }}" != "success" ]]; then
          echo "❌ RTL artifacts upload: ${{ steps.upload-rtl-artifacts.outcome }}"
          NON_SUCCESS_STEPS="$NON_SUCCESS_STEPS upload-rtl-artifacts(${{ steps.upload-rtl-artifacts.outcome }})"
        else
          echo "✅ RTL artifacts upload: success"
        fi

        # Succeed only if ALL steps succeeded
        if [[ -n "$NON_SUCCESS_STEPS" ]]; then
          echo ""
          echo "❌ Job failed - not all steps succeeded:$NON_SUCCESS_STEPS"
          echo "Overall job status: FAILED"
          exit 1
        else
          echo ""
          echo "🎉 ALL steps completed successfully!"
          echo "Overall job status: PASSED"
        fi
