#
# Correlation run: polproj output (opstats CSV) for comparing Polaris simulation against silicon or profiler results.
#
# Run configuration for polproj.py — all TTNN ViT slice workloads + full vit on Blackhole p100a.
#
# Usage (from repo root):
#   python polproj.py config/runcfg_vit_p100a.yaml
#
title: ViT TTNN workloads on p100a
study: vit_p100a
odir: __runvit_p100a
wlspec: config/all_workloads.yaml
archspec: config/tt_bh.yaml
wlmapspec: config/wl2archmapping.yaml
filterwlg: TTNN
filterarch: p100a
datatype: bf16
# Comma-separated workload `name` entries from all_workloads.yaml (no spaces after commas).
filterwl: vit
dump_stats_csv: true
log_level: info
disable_fusion: true
# dump_ttsim_onnx: true # ONNX does not support TTNN-specific operators and model check may fail
