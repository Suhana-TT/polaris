op_data_type_spec:
  global_type: int8
  override:
    dropout: int32

op_removal_spec:
  - Dropout
  - Identity
  - Constant

op_fusion_spec:
  - [Add, LayerNormalization, Matmul, Add, Matmul, Add, Gelu]
  - [Add, LayerNormalization, Matmul, Add, Split]
  - [Add, LayerNormalization, Matmul]
  - [Add, LayerNormalization]
  - [Reshape, Transpose, Transpose]
  - [Reshape, Transpose]
  - [Transpose, Transpose]
  - [Matmul, Add, Matmul, Add, Gelu]
  - [Matmul, Matmul]
  - [Matmul, Mul, Softmax]
  - [Matmul, Mul]
  - [Matmul, Add, Split]
  - [Matmul, Add, Gelu]
  - [Matmul, Add]
  - [Matmul, Gelu, Add]
  - [Matmul, Transpose, Reshape]
  - [Conv, Relu]
  - [Conv, BatchNormalization, Add, Relu, AveragePool, Reshape]
  - [Conv, BatchNormalization, Add, Relu]
  - [Conv, BatchNormalization, Relu, MaxPool]
  - [Conv, BatchNormalization, Relu]
  - [Conv, BatchNormalization, LeakyRelu]
  - [Conv, BatchNormalization, Sigmoid, Mul]
  - [Conv, BatchNormalization, Mul]
  - [Conv, BatchNormalization]
  - [Conv, GroupNormalization, Relu]
  - [Conv, GroupNormalization]

op_rsrc_spec:
  compute:
    matrix: [Matmul, Conv, ConvTranspose, Gemm, MultiheadAttention]
    vector: [Add, And, ArgMax, AveragePool,
             BatchNormalization,
             Cast, Clip, Concat, Constant, ConstantOfShape, Cos, CumSum,
             DequantizeLinear, Div, Dropout,
             Equal, Erf, Exp, Expand,
             Flatten, Fold,
             Gather, GatherND, Gelu, GlobalAveragePool, GridSample, Greater, GroupNormalization,
             HardSigmoid, Hardswish,
             Identity, If, InterleavedToSharded, IsNaN,
             LayerNormalization, LeakyRelu, Log, Less,
             Max, MaxPool, Mean, Min, Mish, Mul,
             Neg, ConcatHeads, CreateQKVHeads, NonMaxSuppression, NonZero, # transformer head ops from ttnn_shim
             Pad, Permute, Pow,
             QuantizeLinear,
             Reciprocal, ReduceMax, ReduceMean, ReduceMin, ReduceProd, ReduceSum, Relu, Reshard, Reshape, Resize,
             ScatterND, ScatterElements, Shape, ShardedToInterleaved, Sigmoid, Sin, Slice, Softmax, SoftmaxCrossEntropyLoss, Softplus, Split, Sqrt, Squeeze, Sub, Sum,
             Tanh, Tile, Tilize, TilizeWithValPadding, TopK, TorchGather, Transpose, Trilu,
             Unsqueeze, Untilize, UntilizeWithUnpadding, Upsample,
             VoxelPooling,
             Where]
