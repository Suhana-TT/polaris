workloads:
  - api: TTSIM
    name: basic_llm
    basedir: workloads
    module : BasicLLM.py
    params :
      vocab_sz             : 50257
      drop_prob            : 0.1
      attn_type            : causal
      norm_type            : layer
      positional_encoding  : learned
      use_segment_embedding: False
      bs                   : 1
    instances:
      gpt_nano  : { nL:  3, nH:  3, dE:   48, nW:   32}
      gpt_micro : { nL:  4, nH:  4, dE:  128, nW:   32}
      gpt_mini  : { nL:  6, nH:  6, dE:  192, nW:   32}
      gpt1      : { nL: 12, nH: 12, dE:  768, nW:  512}
      gpt2_m    : { nL: 24, nH: 16, dE:  768, nW:  768}
      gpt2_l    : { nL: 36, nH: 20, dE: 1280, nW: 1024}
  - api: TTSIM
    name: GPTJ
    basedir: workloads
    module : BasicLLM.py
    params :
      vocab_sz             : 50400
      drop_prob            : 0.1
      attn_type            : causal
      use_bias             : False
      norm_type            : layer
      positional_encoding  : learned
      use_segment_embedding: False
      bs                   : 1
    instances:
      gpt_j     : { nL: 28, nH: 16, dE: 4096, nW: 2048}
  - api: TTSIM
    name: BERT
    basedir: workloads
    module : BasicLLM.py
    params :
      vocab_sz             : 30522
      drop_prob            : 0.1
      attn_type            : bidir
      norm_type            : layer
      positional_encoding  : learned
      use_segment_embedding: True
      bs                   : 1
    instances:
      bert_base : { nL: 12, nH: 12, dE:  768, nW:  512}
      bert_large: { nL: 24, nH: 16, dE: 1024, nW:  512}

  - api: TTSIM
    name: ScaledYOLOv4
    basedir: workloads/ScaledYOLOv4/models
    module : Model@yolo.py
    instances:
      yolov4-csp       : {yaml_cfg_path: 'https://raw.githubusercontent.com/WongKinYiu/ScaledYOLOv4/refs/heads/yolov4-large/models/yolov4-csp.yaml', in_channels: 3, in_resolution: 640, bs: 1}
      yolov4-p5        : {yaml_cfg_path: 'https://raw.githubusercontent.com/WongKinYiu/ScaledYOLOv4/refs/heads/yolov4-large/models/yolov4-p5.yaml',  in_channels: 3, in_resolution: 640, bs: 1}
      yolov4-p6        : {yaml_cfg_path: 'https://raw.githubusercontent.com/WongKinYiu/ScaledYOLOv4/refs/heads/yolov4-large/models/yolov4-p6.yaml',  in_channels: 3, in_resolution: 640, bs: 1}
      yolov4-p7        : {yaml_cfg_path: 'https://raw.githubusercontent.com/WongKinYiu/ScaledYOLOv4/refs/heads/yolov4-large/models/yolov4-p7.yaml',  in_channels: 3, in_resolution: 640, bs: 1}

  - api: TTSIM
    name: YOLOv7
    basedir: workloads
    module : YOLO7@Yolo_v7.py
    instances:
      yolov7-tiny      : {yaml_cfg_path: 'https://raw.githubusercontent.com/WongKinYiu/yolov7/refs/heads/main/cfg/deploy/yolov7-tiny.yaml',      in_channels: 3, in_resolution: 640, bs: 1}
      yolov7-tiny-silu : {yaml_cfg_path: 'https://raw.githubusercontent.com/WongKinYiu/yolov7/refs/heads/main/cfg/deploy/yolov7-tiny-silu.yaml', in_channels: 3, in_resolution: 640, bs: 1}
      yolov7           : {yaml_cfg_path: 'https://raw.githubusercontent.com/WongKinYiu/yolov7/refs/heads/main/cfg/deploy/yolov7.yaml',           in_channels: 3, in_resolution: 640, bs: 1}
      yolov7x          : {yaml_cfg_path: 'https://raw.githubusercontent.com/WongKinYiu/yolov7/refs/heads/main/cfg/deploy/yolov7x.yaml',          in_channels: 3, in_resolution: 640, bs: 1}

  - api: TTSIM
    name: YOLOv8
    basedir: workloads
    module : YOLO8@Yolo_v8.py
    instances:
      yolov8s          : {yaml_cfg_path: 'https://raw.githubusercontent.com/autogyro/yolo-V8/refs/heads/main/ultralytics/models/v8/yolov8s.yaml', in_channels: 3, in_resolution: 640, bs: 1}
      yolov8n          : {yaml_cfg_path: 'https://raw.githubusercontent.com/autogyro/yolo-V8/refs/heads/main/ultralytics/models/v8/yolov8n.yaml', in_channels: 3, in_resolution: 640, bs: 1}
      yolov8m          : {yaml_cfg_path: 'https://raw.githubusercontent.com/autogyro/yolo-V8/refs/heads/main/ultralytics/models/v8/yolov8m.yaml', in_channels: 3, in_resolution: 640, bs: 1}
      # yolov8l          : {yaml_cfg_path: 'https://raw.githubusercontent.com/autogyro/yolo-V8/refs/heads/main/ultralytics/models/v8/yolov8l.yaml', in_channels: 3, in_resolution: 640, bs: 1}
      # yolov8x          : {yaml_cfg_path: 'https://raw.githubusercontent.com/autogyro/yolo-V8/refs/heads/main/ultralytics/models/v8/yolov8x.yaml', in_channels: 3, in_resolution: 640, bs: 1}
      # yolov8x6         : {yaml_cfg_path: 'https://raw.githubusercontent.com/autogyro/yolo-V8/refs/heads/main/ultralytics/models/v8/yolov8x6.yaml', in_channels: 3, in_resolution: 640, bs: 1}

  - api: TTSIM
    name: RESNET50
    basedir: workloads
    module : ResNet@basicresnet.py
    params : {layers: [3,4,6,3], num_classes: 1000, num_channels: 3, bs: 1}
    instances:
      rn50_224x224 : { img_height: 224, img_width: 224 }
      rn50_b1_hd : { img_height: 1024, img_width: 1024, use_adaptive_pool: true, init_stride: 4 }
      rn50_b1_uhd: { img_height: 2828, img_width: 2828, use_adaptive_pool: true, init_stride: 4 }

  - api: TTSIM
    name: BEVDepth
    basedir: workloads/bevdepth
    module : BaseBEVDepth@BEVDepth.py
    params :
      is_train_depth    : false
      training          : false
      num_cameras       : 1
      num_sweeps        : 2
      head_conf_yaml    : config/bevdepth_cfgs/bevdepth_head.yaml
      backbone_conf_yaml: config/bevdepth_cfgs/bevdepth_backbone.yaml
    instances:
      bevdepth_s : { img_height:   32, img_width:   32, img_channels: 3, bs: 1 }
      bevdepth_m : { img_height:  256, img_width:  256, img_channels: 3, bs: 1 }
      bevdepth_l : { img_height: 1024, img_width: 1024, img_channels: 3, bs: 1 }

  - api: TTSIM
    name: DeformableDETR
    basedir: workloads/Deformable_DETR/models
    module : DeformableDETR@deformable_detr_ttsim.py
    params : {num_classes: 80, num_queries: 300, hidden_dim: 256, num_feature_levels: 4, num_encoder_layers: 6, num_decoder_layers: 6, img_channels: 3, bs: 1, name: 'detr'}
    instances:
      detr_640x640 : { img_height: 640, img_width: 640 }
      detr_800x800 : { img_height: 800, img_width: 800 }
      detr_1024x1024 : { img_height: 1024, img_width: 1024 }

  - api: TTSIM
    name: UNet
    basedir: workloads/UNet
    module : UNet@unet_model.py
    instances:
      unet_b1 : {n_channels: 3, n_classes: 2, img_size: 256, bilinear: False, bs: 1}

  - api: TTSIM
    name: llama2
    basedir: workloads/llama2
    module : Transformer@model.py
    instances:
      input_small: {dim: 32, n_layers: 2, n_heads: 2, vocab_size: 256, max_batch_size: 2, max_seq_len: 8, seq_len: 1, bs: 1}
      input_standard: {dim: 4096, n_layers: 32, n_heads: 32, vocab_size: 32000, max_batch_size: 2, max_seq_len: 8, seq_len: 1, bs: 1}

  - api: TTSIM
    name: SwinTransformer
    basedir: workloads/Swin-Transformer
    module : SwinTransformer@SwinTransformer.py
    instances:
      input_1: {img_size: 224, in_chans: 3, bs: 3, num_classes: 3000}

  - api: TTSIM
    name: LeViT
    basedir: workloads/LeViT
    module : LEVIT@LeViT.py
    instances:
      LeViT_128S: { img_height: 224, img_width: 224, img_channels: 3, bs: 1, patch_size: 16, dims: [128, 256, 384], depths: [2, 3, 4], heads: [4, 6, 8], key_dim: [16, 16, 16], attn_ratio: [2, 2, 2], mlp_ratio: [2, 2, 2], down_ops: [["Subsample", 16, 8, 4, 2, 2], ["Subsample", 16, 16, 4, 2, 2]], drop_path: 0, global_pool: avg, compute_pipe: matrix }
      LeViT_128: { img_height: 224, img_width: 224, img_channels: 3, bs: 1, patch_size: 16, dims: [128, 256, 384], depths: [4, 4, 4], heads: [4, 8, 12], key_dim: [16, 16, 16], attn_ratio: [2, 2, 2], mlp_ratio: [2, 2, 2], down_ops: [["Subsample", 16, 8, 4, 2, 2], ["Subsample", 16, 16, 4, 2, 2]], drop_path: 0, global_pool: avg, compute_pipe: matrix }
      LeViT_192: { img_height: 224, img_width: 224, img_channels: 3, bs: 1, patch_size: 16, dims: [192, 288, 384], depths: [4, 4, 4], heads: [3, 5, 6], key_dim: [32, 32, 32], attn_ratio: [2, 2, 2], mlp_ratio: [2, 2, 2], down_ops: [["Subsample", 32, 6, 4, 2, 2], ["Subsample", 32, 9, 4, 2, 2]], drop_path: 0, global_pool: avg, compute_pipe: matrix }
      LeViT_256: { img_height: 224, img_width: 224, img_channels: 3, bs: 1, patch_size: 16, dims: [256, 384, 512], depths: [4, 4, 4], heads: [4, 6, 8], key_dim: [32, 32, 32], attn_ratio: [2, 2, 2], mlp_ratio: [2, 2, 2], down_ops: [["Subsample", 32, 8, 4, 2, 2], ["Subsample", 32, 12, 4, 2, 2]], drop_path: 0, global_pool: avg, compute_pipe: matrix }
      LeViT_384: { img_height: 224, img_width: 224, img_channels: 3, bs: 1, patch_size: 16, dims: [384, 512, 768], depths: [6, 9, 12], heads: [6, 9, 12], key_dim: [32, 32, 32], attn_ratio: [2, 2, 2], mlp_ratio: [2, 2, 2], down_ops: [["Subsample", 32, 12, 4, 2, 2], ["Subsample", 32, 16, 4, 2, 2]], drop_path: 0.1, global_pool: avg, compute_pipe: matrix }

  - api: TTNN
    name: VGG_UNET
    basedir: workloads/ttnn/vgg_unet
    module : test_vgg_unet@ttnn_vgg_unet.py
    instances:
      vgg_unet_test: { bs: 1}
      vgg_unet_256x256: { bs: 1, img_height: 256, img_width: 256}

  - api: TTNN
    name: llama3_decode
    basedir: workloads/ttnn/llama3
    module : run_llama3@test_llama3_decode.py
    instances:
      llama3_8b_decode: { bs: 1, model_name: llama3-8B }

  - api: TTNN
    name: llama3_prefill
    basedir: workloads/ttnn/llama3
    module : run_llama3@test_llama3_prefill.py
    instances:
      llama3_8b_prefill: { bs: 1, model_name: llama3-8B }

  - api: TTNN
    name: vit_patch_embeddings
    basedir: workloads/ttnn/vit
    module : run_vit_patch_embeddings@run_ttnn_functional_vit.py
    instances:
      vit_b16_patch_embeddings: { bs: 1, model_name: vit-b16-patch-embeddings }

  - api: TTNN
    name: vit_embeddings
    basedir: workloads/ttnn/vit
    module : run_vit_embeddings@run_ttnn_functional_vit.py
    instances:
      vit_b16_embeddings: { bs: 1, model_name: vit-b16-embeddings }

  - api: TTNN
    name: mistral_decode
    basedir: workloads/ttnn/mistral
    module : test_model_inference@test_model.py
    instances:
      mistral_7b_decode: { bs: 1, model_name: Mistral-7B }

  - api: TTNN
    name: mistral_prefill
    basedir: workloads/ttnn/mistral
    module : test_model_paged_prefill@test_model_prefill.py
    instances:
      mistral_7b_prefill: { bs: 1, model_name: Mistral-7B }

  - api: TTNN
    name: mixtral_decode
    basedir: workloads/ttnn/mixtral
    module : test_model_inference@test_mixtral_model.py
    instances:
      mixtral_8x7b_decode: { bs: 1, model_name: mixtral-8x7b, layers: 2 }

  - api: TTNN
    name: mixtral_prefill
    basedir: workloads/ttnn/mixtral
    module : test_model_inference@test_mixtral_model_prefill.py
    instances:
      mixtral_8x7b_prefill: { bs: 1, model_name: mixtral-8x7b }

  - api: TTNN
    name: qwen2.5_decode
    basedir: workloads/ttnn/qwen2.5
    module : test_model_inference_qwen@test_model.py
    instances:
      qwen2.5_7b_decode: { bs: 1, model_name: Qwen2.5-7B }

  - api: TTNN
    name: qwen2.5_prefill
    basedir: workloads/ttnn/qwen2.5
    module : test_model_full_prefill_qwen@test_model_prefill.py
    instances:
      qwen2.5_7b_prefill: { bs: 1, model_name: Qwen2.5-7B }

  - api: TTSIM
    name: UniAD
    basedir: workloads/UniAD
    module : UniAD_E2E@UniAD_E2E.py
    params :
      embed_dims      : 256
      num_query       : 900
      num_classes     : 10
      bev_h           : 50
      bev_w           : 50
      num_cameras     : 6
      resnet_depth    : 50
      num_enc_layers  : 6
      num_heads       : 8
      ffn_dim         : 512
      num_dec_layers  : 6
      predict_steps   : 12
      num_anchor      : 6
      n_future        : 4
      planning_steps  : 6
      bev_proj_dim    : 64
      num_occ_classes : 2
      num_things_classes: 8
      num_stuff_classes : 2
      num_dec_things  : 6
      num_dec_stuff   : 6
      num_query_things: 300
      num_query_stuff : 100
    instances:
      uniad_full : { img_height: 256, img_width: 256, bs: 1 }

  - api: TTSIM
    name: MapTracker
    basedir: workloads/MapTracker/plugin/models/maper
    module : MapTracker@MapTracker.py
    params : {bs: 1, seg_in_channels: 256, seg_embed_dims: 256, vector_embed_dims: 256, seg_num_classes: 3, vector_num_points: 20}
    instances:
      maptracker_tiny   : { bev_h: 25, bev_w: 50, vector_num_queries: 50, canvas_size: [50, 100], img_height: 256, img_width: 256 }
      maptracker_small  : { bev_h: 50, bev_w: 100, vector_num_queries: 100, canvas_size: [100, 200], img_height: 480, img_width: 800 }
      maptracker_base   : { bev_h: 100, bev_w: 200, vector_num_queries: 100, canvas_size: [200, 400], img_height: 480, img_width: 800 }
  - api: TTNN
    name: vit_attention
    basedir: workloads/ttnn/vit
    module : run_vit_attention@run_ttnn_functional_vit.py
    instances:
      vit_b16_attention: { bs: 1, model_name: vit-b16-attention }

  - api: TTNN
    name: vit_intermediate
    basedir: workloads/ttnn/vit
    module : run_vit_intermediate@run_ttnn_functional_vit.py
    instances:
      vit_b16_intermediate: { bs: 1, model_name: vit-b16-intermediate }

  - api: TTNN
    name: vit_output
    basedir: workloads/ttnn/vit
    module : run_vit_output@run_ttnn_functional_vit.py
    instances:
      vit_b16_output: { bs: 1, model_name: vit-b16-output }

  - api: TTNN
    name: vit_layer
    basedir: workloads/ttnn/vit
    module : run_vit_layer@run_ttnn_functional_vit.py
    instances:
      vit_b16_layer: { bs: 1, model_name: vit-b16-layer }

  - api: TTNN
    name: vit_encoder
    basedir: workloads/ttnn/vit
    module : run_vit_encoder@run_ttnn_functional_vit.py
    instances:
      vit_b16_encoder: { bs: 1, model_name: vit-b16-encoder }

  - api: TTNN
    name: vit
    basedir: workloads/ttnn/vit
    module : run_vit@run_ttnn_functional_vit.py
    instances:
      vit_b16: { bs: 1, model_name: vit-b16 }
      vit_base_224x224: { bs: 1, model_name: vit-b16 }
  - api: TTSIM
    name: DiffusionDrive
    basedir: workloads/DiffusionDrive/navsim/agents/diffusiondrive
    module : V2TransfuserModel@transfuser_model_v2_ttsim.py
    params :
      image_architecture: resnet34
      lidar_architecture: resnet34
      bs: 1
    instances:
      dd_base  : { camera_height: 256, camera_width: 1024, lidar_h: 256, lidar_w: 256 }
      dd_small : { camera_height: 256, camera_width: 256, lidar_h: 256, lidar_w: 256 }


